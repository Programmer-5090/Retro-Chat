services:
  chat-server:
    build: .
    restart: unless-stopped
    ports:
      - "8082:8082"
    environment:
      DATABASE_URL: postgres://retrochat:retrochat@postgres:5432/retrochat
      REDIS_URL: redis://redis:6379
      BIND_ADDR: 0.0.0.0:8082
      # NO_TLS: 1
    volumes:
      - ./cert.pem:/usr/local/bin/cert.pem
      - ./key.pem:/usr/local/bin/key.pem
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: retrochat
      POSTGRES_PASSWORD: retrochat
      POSTGRES_DB: retrochat
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  pgdata:
